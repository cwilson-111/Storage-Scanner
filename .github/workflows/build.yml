name: Build StorageScanner.exe

# Builds the standalone Windows executable when you push a version tag like
# v1.0.0, then attaches StorageScanner.exe to a GitHub Release automatically.
# Can also be triggered manually from the Actions tab (Run workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller --onefile --windowed --name StorageScanner --icon icon.ico --add-data "icon.ico;." treesize.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StorageScanner
          path: dist/StorageScanner.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StorageScanner.exe
